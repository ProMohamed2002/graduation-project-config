name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build Docker Stack & Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Set up Docker Buildx (professional multi-platform builder)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Lint Dockerfiles
      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v2
        with:
          dockerfile: ./Dockerfile

      # 4. Lint docker-compose.yml
      - name: Lint docker-compose
        uses: redcoolbeans/docker-compose-linter-action@v1

      # 5. Build all Docker images
      - name: Build Docker Images
        run: docker compose build --pull --progress=plain

      # 6. Start services in detached mode
      - name: Start Docker Stack
        run: docker compose up -d

      # 7. Smoke tests
      - name: Smoke test containers
        run: |
          echo "Waiting for services to start..."
          sleep 20
          docker ps
          # check if key ports are open
          for port in 8080 8082 5432 8123 9092; do
            nc -zv localhost $port
          done

      # 8. Optional: Run healthcheck for NiFi
      - name: NiFi Healthcheck
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/nifi)
          if [ "$STATUS" -ne 200 ]; then
            echo "NiFi not ready"
            exit 1
          fi

      # 9. Tear down stack
      - name: Stop Docker Stack
        run: docker compose down -v
